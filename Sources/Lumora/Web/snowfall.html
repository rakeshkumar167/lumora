<!DOCTYPE html>
<!--
  Snowfall — a full-screen ShaderMaterial pen: a raymarched-in-2D field of
  layered "bokeh" particles zooming toward camera through fractal-noise-tinted
  fog, giving a drifting snow/embers look. Ported from a CodePen (three r88,
  global `THREE`) to the shared three 0.167 ESM build — no CDN. The original
  loaded a noise texture from an external CDN for the shader's hash() lookup;
  that texture is regenerated procedurally on a canvas here. Group 1: the
  pointermove listener is removed; u_mouse is driven by a slow constant drift
  instead of live cursor input (the visible shader does not actually sample
  u_mouse, so this only affects future-proofing/parity with the original
  uniform wiring). Bundled and loaded into a WKWebView by WebEffectContent.
-->
<html>
<head>
<meta charset="utf-8">
<title>Snowfall</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
<script type="importmap">
{ "imports": {
    "three": "./lib/three/three.module.js",
    "three/addons/": "./lib/three/addons/"
} }
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
window.THREE = THREE;

// ── Procedural stand-in for the pen's external noise.png ────────────────────
// The fragment shader's hash()/hash2() sample a wrapped noise texture at
// (p+0.5)/256.0 — a classic per-texel white-noise lookup table. We build an
// equivalent 256x256 RGBA random texture on a canvas (no CDN).
function makeNoiseTexture() {
  const size = 256;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(size, size);
  for (let i = 0; i < size * size; i++) {
    imgData.data[i * 4 + 0] = Math.floor(Math.random() * 256);
    imgData.data[i * 4 + 1] = Math.floor(Math.random() * 256);
    imgData.data[i * 4 + 2] = Math.floor(Math.random() * 256);
    imgData.data[i * 4 + 3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.minFilter = THREE.LinearFilter;
  tex.needsUpdate = true;
  return tex;
}

const vertexShader = `
void main() {
    gl_Position = vec4( position, 1.0 );
}
`;

const fragmentShader = `
uniform vec2 u_resolution;
uniform vec2 u_mouse;
uniform float u_time;
uniform sampler2D u_noise;

#define PI 3.141592653589793
#define TAU 6.

const float multiplier = 25.5;

const float zoomSpeed = 10.;
const int layers = 10;

const int octaves = 5;

vec2 hash2(vec2 p)
{
  vec2 o = texture2D( u_noise, (p+0.5)/256.0, -100.0 ).xy;
  return o;
}

mat2 rotate2d(float _angle){
    return mat2(cos(_angle),sin(_angle),
                -sin(_angle),cos(_angle));
}

vec3 hsb2rgb( in vec3 c ){
  vec3 rgb = clamp(abs(mod(c.x*6.0+vec3(0.0,4.0,2.0),
                           6.0)-3.0)-1.0,
                   0.0,
                   1.0 );
  rgb = rgb*rgb*(3.0-2.0*rgb);
  return c.z * mix( vec3(1.0), rgb, c.y);
}

float hash(vec2 p)
{
  float o = texture2D( u_noise, (p+0.5)/256.0, -100.0 ).x;
  return o;
}
float noise(vec2 uv) {
  vec2 id = floor(uv);
  vec2 subuv = fract(uv);
  vec2 u = subuv * subuv * (3. - 2. * subuv);
  float a = hash(id);
  float b = hash(id + vec2(1., 0.));
  float c = hash(id + vec2(0., 1.));
  float d = hash(id + vec2(1., 1.));
  return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
}
float fbm(in vec2 uv) {
  float s = .0;
  float m = .0;
  float a = .5;
  for(int i = 0; i < octaves; i++) {
    s += a * noise(uv);
    m += a;
    a *= .5;
    uv *= 2.;
  }
  return s / m;
}

vec3 domain(vec2 z){
  return vec3(hsb2rgb(vec3(atan(z.y,z.x)/TAU,1.,1.)));
}
vec3 colour(vec2 z) {
    return domain(z);
}

// The render function is where we render the pattern to be added to the layer
vec3 render(vec2 uv, float scale, vec3 colour) {
  vec2 id = floor(uv);
  vec2 subuv = fract(uv);
  vec2 rand = hash2(id);
  float bokeh = abs(scale) * 1.;

  float particle = 0.;

  if(length(rand) > 1.3) {
    vec2 pos = subuv-.5;
    float field = length(pos);
    particle = smoothstep(.3, 0., field);
    particle += smoothstep(.4, 0.34 * bokeh, field);
  }
  return vec3(particle*2.);
}

vec3 renderLayer(int layer, int layers, vec2 uv, inout float opacity, vec3 colour, float n) {
  vec2 _uv = uv;
  float scale = mod((u_time + zoomSpeed / float(layers) * float(layer)) / zoomSpeed, -1.);
  uv *= 20.;
  uv *= scale*scale;
  uv = rotate2d(u_time / 10.) * uv;
  uv += vec2(25. + sin(u_time*.1)) * float(layer);

  vec3 pass = render(uv * multiplier, scale, colour) * .2;

  opacity = 1. + scale;
  float _opacity = opacity;

  float endOpacity = smoothstep(0., 0.4, scale * -1.);
  opacity += endOpacity;

  return pass * _opacity * endOpacity;
}

void main() {
    vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy);

    if(u_resolution.y < u_resolution.x) {
      uv /= u_resolution.y;
    } else {
      uv /= u_resolution.x;
    }

    float n = fbm((uv + vec2(sin(u_time*.1), u_time*.1)) * 2. - 2.);

    vec3 colour = vec3(0.);
    colour = n * mix(vec3(0., .5, 1.5), clamp(vec3(1., .5, .25)*2., 0., 1.), n);

    float opacity = 1.;
    float opacity_sum = 1.;

    for(int i = 1; i <= layers; i++) {
      colour += renderLayer(i, layers, uv, opacity, colour, n);
      opacity_sum += opacity;
    }

    colour /= opacity_sum;

    gl_FragColor = vec4(clamp(colour * 20., 0., 1.),1.0);
}
`;

let camera, scene, renderer, uniforms;

function init() {
  camera = new THREE.Camera();
  camera.position.z = 1;

  scene = new THREE.Scene();

  const geometry = new THREE.PlaneGeometry(2, 2);

  uniforms = {
    u_time: { value: 1.0 },
    u_resolution: { value: new THREE.Vector2() },
    u_noise: { value: makeNoiseTexture() },
    u_mouse: { value: new THREE.Vector2() },
  };

  const material = new THREE.ShaderMaterial({
    uniforms: uniforms,
    vertexShader: vertexShader,
    fragmentShader: fragmentShader,
  });
  material.extensions.derivatives = true;

  const mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);

  // The shader always writes gl_FragColor.a = 1.0 (fully opaque), so the
  // effect fills the whole canvas regardless of clear alpha — transparent
  // clear is still set for consistency with the other web effects.
  renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setClearColor(0x000000, 0);
  renderer.setPixelRatio(window.devicePixelRatio || 1);
  document.body.appendChild(renderer.domElement);

  onWindowResize();
  window.addEventListener('resize', onWindowResize, false);
}

function onWindowResize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  uniforms.u_resolution.value.x = renderer.domElement.width;
  uniforms.u_resolution.value.y = renderer.domElement.height;
}

const start = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const t = (performance.now() - start) / 1000;
  // Group 1: no live pointer input. A slow constant drift replaces the
  // pointermove-driven parallax that used to feed u_mouse.
  uniforms.u_mouse.value.x = Math.sin(t * 0.05) * 0.1;
  uniforms.u_mouse.value.y = 0;
  uniforms.u_time.value = -10000 + performance.now() * 0.0005;
  renderer.render(scene, camera);
}

init();
animate();
</script>
</body>
</html>
