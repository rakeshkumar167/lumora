<!DOCTYPE html>
<!--
  Zooming Spiral — a three.js scene: layered logarithmic spiral line-loops
  (colored teal/red/white/cyan) grouped together, slowly rotating while each
  layer drifts toward the camera and wraps back, plus a scatter of small
  tumbling cones for depth. Camera drifts in a gentle Lissajous orbit. Ported
  from a CodePen (three r128, global `THREE`) to the shared three 0.167 ESM
  build — no CDN. Bundled and loaded into a WKWebView by WebEffectContent.
  Transparent background so the effect overlays other surfaces.
-->
<html>
<head>
<meta charset="utf-8">
<title>Zooming Spiral</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
<script type="importmap">
{ "imports": {
    "three": "./lib/three/three.module.js",
    "three/addons/": "./lib/three/addons/"
} }
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
window.THREE = THREE;

class SpiralZoom {
  constructor() {
    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );

    this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    this.clock = new THREE.Clock();

    this.init();
    this.createSpiral();
    this.animate();
  }

  init() {
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setClearColor(0x000000, 0);
    document.body.appendChild(this.renderer.domElement);

    this.camera.position.z = 10;

    window.addEventListener("resize", () => this.onWindowResize());
  }

  createSpiral() {
    this.spiralGroup = new THREE.Group();
    this.scene.add(this.spiralGroup);

    const segments = 1000;
    const layers = 50;
    const colors = [0xff4444, 0x4444ff, 0xffffff, 0x44ffff];

    for (let layer = 0; layer < layers; layer++) {
      const geometry = new THREE.BufferGeometry();
      const vertices = [];
      const vertexColors = [];
      const layerZ = layer * 0.5 - 25;

      for (let i = 0; i < segments; i++) {
        const t = (i / segments) * Math.PI * 8;
        const radius = 15 * Math.exp(-t * 0.1) + layer * 0.3;

        const x = radius * Math.cos(t + layer * 0.2);
        const y = radius * Math.sin(t + layer * 0.2);

        vertices.push(x, y, layerZ);

        const colorIndex = Math.floor((i + layer * 100) / 250) % colors.length;
        const color = new THREE.Color(colors[colorIndex]);
        vertexColors.push(color.r, color.g, color.b);
      }

      geometry.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(vertices, 3)
      );
      geometry.setAttribute(
        "color",
        new THREE.Float32BufferAttribute(vertexColors, 3)
      );

      const material = new THREE.LineBasicMaterial({
        vertexColors: true,
        linewidth: 2,
        transparent: true,
        opacity: 0.8 - (layer / layers) * 0.5,
      });

      const spiral = new THREE.Line(geometry, material);
      spiral.userData = { originalZ: layerZ, layer: layer };
      this.spiralGroup.add(spiral);
    }

    for (let i = 0; i < 20; i++) {
      const triangleGeometry = new THREE.ConeGeometry(0.5, 1, 3);
      const triangleMaterial = new THREE.MeshBasicMaterial({
        color: colors[i % colors.length],
        transparent: true,
        opacity: 0.6,
      });

      const triangle = new THREE.Mesh(triangleGeometry, triangleMaterial);
      triangle.position.set(
        (Math.random() - 0.5) * 30,
        (Math.random() - 0.5) * 30,
        Math.random() * -50
      );

      triangle.rotation.z = Math.random() * Math.PI * 2;
      triangle.userData = { originalZ: triangle.position.z };
      this.spiralGroup.add(triangle);
    }
  }

  animate() {
    requestAnimationFrame(() => this.animate());

    const elapsed = this.clock.getElapsedTime();

    this.spiralGroup.rotation.z = elapsed * 0.1;

    const zoomSpeed = 0.3;
    const resetDistance = 30;

    this.spiralGroup.children.forEach((child) => {
      child.position.z += zoomSpeed;

      if (child.position.z > 20) {
        child.position.z = child.userData.originalZ - resetDistance;
      }
    });

    this.camera.position.x = Math.sin(elapsed * 0.1) * 2;
    this.camera.position.y = Math.cos(elapsed * 0.15) * 1;
    this.camera.lookAt(0, 0, 0);

    this.renderer.render(this.scene, this.camera);
  }

  onWindowResize() {
    this.camera.aspect = window.innerWidth / window.innerHeight;
    this.camera.updateProjectionMatrix();
    this.renderer.setSize(window.innerWidth, window.innerHeight);
  }
}

new SpiralZoom();
</script>
</body>
</html>
