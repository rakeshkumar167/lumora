<!DOCTYPE html>
<!--
  Starfall — a full-screen ShaderMaterial pen with a feedback accumulation
  buffer: each frame renders new "bokeh" starfall layers into an offscreen
  render target while sampling the *previous* frame's target as a decaying
  trail, then displays the composited result. Two ping-ponged
  WebGLRenderTargets implement the feedback loop. Ported from a CodePen
  (three r88, global `THREE`) to the shared three 0.167 ESM build — no CDN.
  The original loaded a noise texture from an external CDN for the shader's
  hash2() lookup; that texture is regenerated procedurally on a canvas here.
  Group 1: pointermove/pointerdown/pointerup are removed. u_mouse is kept as
  a vec4 uniform, driven toward a fixed (0,0) target (the click flags z/w are
  never set, so they stay 0) — the visible shader does not actually sample
  u_mouse, so the starfall animates purely from u_time and u_frame. Bundled
  and loaded into a WKWebView by WebEffectContent.
-->
<html>
<head>
<meta charset="utf-8">
<title>Starfall</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
</style>
<script type="importmap">
{ "imports": {
    "three": "./lib/three/three.module.js",
    "three/addons/": "./lib/three/addons/"
} }
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
window.THREE = THREE;

// ── Procedural stand-in for the pen's external noise.png ────────────────────
function makeNoiseTexture() {
  const size = 256;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(size, size);
  for (let i = 0; i < size * size; i++) {
    imgData.data[i * 4 + 0] = Math.floor(Math.random() * 256);
    imgData.data[i * 4 + 1] = Math.floor(Math.random() * 256);
    imgData.data[i * 4 + 2] = Math.floor(Math.random() * 256);
    imgData.data[i * 4 + 3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.minFilter = THREE.LinearFilter;
  tex.needsUpdate = true;
  return tex;
}

const vertexShader = `
void main() {
    gl_Position = vec4( position, 1.0 );
}
`;

const fragmentShader = `
uniform vec2 u_resolution;
uniform vec4 u_mouse;
uniform float u_time;
uniform sampler2D u_noise;
uniform sampler2D u_buffer;
uniform bool u_renderpass;
uniform int u_frame;

#define PI 3.141592653589793
#define TAU 6.283185307179586

const float multiplier = 25.5;

const float zoomSpeed = 3.;
const int layers = 5;

mat2 rotate2d(float _angle){
    return mat2(cos(_angle),sin(_angle),
                -sin(_angle),cos(_angle));
}

vec2 hash2(vec2 p)
{
  vec2 o = texture2D( u_noise, (p+0.5)/256.0, -100.0 ).xy;
  return o;
}

vec3 hsb2rgb( in vec3 c ){
  vec3 rgb = clamp(abs(mod(c.x*6.0+vec3(0.0,4.0,2.0),
                           6.0)-3.0)-1.0,
                   0.0,
                   1.0 );
  rgb = rgb*rgb*(3.0-2.0*rgb);
  return c.z * mix( vec3(1.0), rgb, c.y);
}

vec3 domain(vec2 z){
  return vec3(hsb2rgb(vec3(atan(z.y,z.x)/TAU,1.,1.)));
}
vec3 colour(vec2 z) {
    return domain(z);
}

// The render function is where we render the pattern to be added to the layer
vec3 render(vec2 uv, float scale) {
  vec2 id = floor(uv);
  vec2 subuv = fract(uv);
  vec2 rand = hash2(id);
  float bokeh = abs(scale) * 1.;

  float particle = 0.;

  if(length(rand) > 1.3) {
    vec2 pos = subuv-.5;
    float field = length(pos);
    particle = smoothstep(.7, 0., field);
    particle += smoothstep(.2, 0.2 * bokeh, field);
  }
  return vec3(particle*2.);
}

vec3 renderLayer(int layer, int layers, vec2 uv, inout float opacity) {
  vec2 _uv = uv;
  float scale = mod((u_time + zoomSpeed / float(layers) * float(layer)) / zoomSpeed, -1.);
  uv *= 20.;
  uv *= scale*scale;
  uv = rotate2d(u_time / 10.) * uv;
  uv += vec2(25. + sin(u_time*.1)*.2) * float(layer);

  vec3 pass = render(uv * multiplier, scale) * .2;

  opacity = 1. + scale;
  float _opacity = opacity;

  float endOpacity = smoothstep(0., 0.4, scale * -1.);
  opacity += endOpacity;

  return pass * _opacity * endOpacity;
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.y, u_resolution.x);
  vec2 uvSample = gl_FragCoord.xy / u_resolution.xy;

  vec4 fragcolour;

  if(u_renderpass == true) {

    if(u_frame > 5) {
      fragcolour = texture2D(u_buffer, uvSample) * 6.;
    }
    uv *= rotate2d(u_time*.5);

    float opacity = 1.;
    float opacity_sum = 1.;

    for(int i = 1; i <= layers; i++) {
      fragcolour += clamp(vec4(renderLayer(i, layers, uv, opacity), 1.) * 5., 0., 5.);
      opacity_sum += opacity;
    }

    fragcolour *= 1./opacity_sum;
  } else {
    fragcolour = texture2D(u_buffer, uvSample) * 5.;
  }

  gl_FragColor = fragcolour;
}
`;

let camera, scene, renderer, uniforms;
let w = window.innerWidth, h = window.innerHeight;
const textureFraction = 1;
let rtTexture, rtTexture2;

// Group 1: no live pointer input. u_mouse eases toward a fixed (0,0) target
// instead of a cursor-driven value, and the click flags (z, w) are never set.
const targetMouse = { x: 0, y: 0 };
const divisor = 1 / 8;

function init() {
  camera = new THREE.Camera();
  camera.position.z = 1;

  scene = new THREE.Scene();

  const geometry = new THREE.PlaneGeometry(2, 2);

  rtTexture = new THREE.WebGLRenderTarget(w * textureFraction, h * textureFraction);
  rtTexture2 = new THREE.WebGLRenderTarget(w * textureFraction, h * textureFraction);

  uniforms = {
    u_time: { value: 1.0 },
    u_resolution: { value: new THREE.Vector2() },
    u_noise: { value: makeNoiseTexture() },
    u_buffer: { value: rtTexture.texture },
    u_mouse: { value: new THREE.Vector4(0, 0, 0, 0) },
    u_frame: { value: -1 },
    u_renderpass: { value: false },
  };

  const material = new THREE.ShaderMaterial({
    uniforms: uniforms,
    vertexShader: vertexShader,
    fragmentShader: fragmentShader,
  });
  material.extensions.derivatives = true;

  const mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);

  renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setClearColor(0x000000, 0);
  renderer.setPixelRatio(window.devicePixelRatio || 1);
  document.body.appendChild(renderer.domElement);

  onWindowResize();
  window.addEventListener('resize', onWindowResize, false);
}

function onWindowResize() {
  w = window.innerWidth;
  h = window.innerHeight;

  renderer.setSize(w, h);
  uniforms.u_resolution.value.x = renderer.domElement.width;
  uniforms.u_resolution.value.y = renderer.domElement.height;

  uniforms.u_frame.value = 0;

  rtTexture = new THREE.WebGLRenderTarget(w * textureFraction, h * textureFraction);
  rtTexture2 = new THREE.WebGLRenderTarget(w * textureFraction, h * textureFraction);
}

function renderTexture() {
  const odims = uniforms.u_resolution.value.clone();
  uniforms.u_resolution.value.x = w * textureFraction;
  uniforms.u_resolution.value.y = h * textureFraction;

  uniforms.u_buffer.value = rtTexture2.texture;
  uniforms.u_renderpass.value = true;

  renderer.setRenderTarget(rtTexture);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);

  const buffer = rtTexture;
  rtTexture = rtTexture2;
  rtTexture2 = buffer;

  uniforms.u_buffer.value = rtTexture.texture;
  uniforms.u_resolution.value = odims;
  uniforms.u_renderpass.value = false;
}

function animate() {
  requestAnimationFrame(animate);

  uniforms.u_frame.value++;

  uniforms.u_mouse.value.x += (targetMouse.x - uniforms.u_mouse.value.x) * divisor;
  uniforms.u_mouse.value.y += (targetMouse.y - uniforms.u_mouse.value.y) * divisor;

  uniforms.u_time.value = performance.now() * 0.0005;
  renderer.render(scene, camera);
  renderTexture();
}

init();
animate();
</script>
</body>
</html>
