<!DOCTYPE html>
<!--
  Flow Field (p5) — a p5.js generative sketch: a swarm of particles advected by
  an animated Perlin-noise flow field, drawn as fading glowing trails that
  slowly repaint the frame. Uses the vendored global build lib/p5.min.js
  (v1.9.0, exposes `p5`) — no CDN. Bundled and loaded into a WKWebView by
  WebEffectContent. Near-transparent trails over a dark wash.
-->
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
  canvas { display: block; }
</style>
<script src="lib/p5.min.js"></script>
</head>
<body>
<script>
let particles = [];
const NUM = 900;
const noiseScale = 0.0016;
let t = 0;

function setup() {
  const c = createCanvas(windowWidth, windowHeight);
  c.style('display', 'block');
  colorMode(HSB, 360, 100, 100, 100);
  background(210, 60, 6);           // dark teal wash
  for (let i = 0; i < NUM; i++) {
    particles.push(createVector(random(width), random(height)));
  }
  strokeWeight(1.4);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(210, 60, 6);
}

function draw() {
  // Slow fade so trails build then dissipate (semi-transparent dark overlay).
  noStroke();
  fill(210, 60, 6, 6);
  rect(0, 0, width, height);

  t += 0.0016;
  for (let p of particles) {
    // Flow angle from 3-D Perlin noise (x, y, time).
    const a = noise(p.x * noiseScale, p.y * noiseScale, t) * TWO_PI * 2.0;
    const hue = (180 + 120 * noise(p.x * noiseScale * 2, p.y * noiseScale * 2, t)) % 360;
    stroke(hue, 80, 100, 55);
    const nx = p.x + cos(a) * 1.8;
    const ny = p.y + sin(a) * 1.8;
    line(p.x, p.y, nx, ny);
    p.x = nx; p.y = ny;
    // Wrap / respawn when a particle leaves the frame.
    if (p.x < 0 || p.x > width || p.y < 0 || p.y > height) {
      p.x = random(width); p.y = random(height);
    }
  }
}
</script>
</body>
</html>
